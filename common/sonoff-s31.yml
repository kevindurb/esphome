---
esp8266:
  board: esp12e
  early_pin_init: false

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
      inverted: true
    name: '${friendly_name} Button'
    on_press:
      - light.toggle: light_1
  - platform: status
    name: '${friendly_name} Status'

sensor:
  - platform: wifi_signal
    name: '${friendly_name} WiFi Signal'
    update_interval: 60s
  - platform: cse7766
    current:
      name: '${friendly_name} Current'
      accuracy_decimals: 2
      filters:
        - throttle_average: 60s
    voltage:
      name: '${friendly_name} Voltage'
      accuracy_decimals: 2
      filters:
        - throttle_average: 60s
    power:
      name: '${friendly_name} Power'
      accuracy_decimals: 2
      id: power
      filters:
        - throttle_average: 60s
    energy:
      name: '${friendly_name} Energy'
      accuracy_decimals: 2
      filters:
        - throttle: 60s
    apparent_power:
      name: '${friendly_name} Apparent Power'
      filters:
        - throttle_average: 60s
    power_factor:
      name: '${friendly_name} Power Factor'
      accuracy_decimals: 2
      filters:
        - throttle_average: 60s

  - platform: total_daily_energy
    name: '${friendly_name} Daily Energy'
    power_id: power
    accuracy_decimals: 2

output:
  - platform: gpio
    pin: GPIO12
    id: relay

light:
  - platform: binary
    name: '${friendly_name}'
    id: light_1
    output: relay

status_led:
  pin:
    number: GPIO13
    inverted: true
